<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Company Docs Search Skill (Debug)</title>
</head>
<body>
<script>
// =====================================================
// 社内文書検索 Skill (デバッグ版)
// エラー時に詳細情報を result として返すので、
// 画面上でエラーの詳細が見えるようになります
// =====================================================

const SEARCH_API_URL = "https://woven-awning-lanky.ngrok-free.dev/search";

const TIMEOUT_MS = 15000;


async function ai_edge_gallery_get_result(data) {
  const debug = [];
  debug.push("[DEBUG] Skill called");
  debug.push("[DEBUG] Endpoint: " + SEARCH_API_URL);

  let params;
  try {
    params = JSON.parse(data);
    debug.push("[DEBUG] Input parsed: " + JSON.stringify(params));
  } catch (e) {
    return JSON.stringify({
      result: debug.join("\n") + "\n\n[ERROR] JSON解析失敗: " + e.message + "\n入力data: " + data
    });
  }

  const query = (params.query || "").trim();
  if (!query) {
    return JSON.stringify({
      result: debug.join("\n") + "\n\n[ERROR] queryが空です"
    });
  }

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), TIMEOUT_MS);

  try {
    debug.push("[DEBUG] Starting fetch...");
    const res = await fetch(SEARCH_API_URL, {
      method: "POST",
      headers: { 
        "Content-Type": "application/json",
        "ngrok-skip-browser-warning": "true"
      },
      body: JSON.stringify({ query: query }),
      signal: controller.signal
    });
    clearTimeout(timer);
    debug.push("[DEBUG] Fetch responded, status=" + res.status);

    if (!res.ok) {
      const bodyText = await res.text();
      return JSON.stringify({
        result: debug.join("\n") + "\n\n[ERROR] HTTP " + res.status + "\nBody: " + bodyText.substring(0, 500)
      });
    }

    const json = await res.json();
    debug.push("[DEBUG] JSON parsed, results count=" + (json.results ? json.results.length : 0));

    if (!json.results || json.results.length === 0) {
      return JSON.stringify({
        result: debug.join("\n") + "\n\n[結果] 検索結果が0件でした。"
      });
    }

    const formatted = json.results.map(r => {
      return `【文書${r.index}】${r.filename}\n${r.snippet}`;
    }).join("\n\n---\n\n");

    return JSON.stringify({
      result: `検索結果(${json.results.length}件):\n\n${formatted}`
    });

  } catch (e) {
    clearTimeout(timer);
    debug.push("[DEBUG] Exception: " + e.name + " - " + e.message);
    
    let errMsg = "";
    if (e.name === "AbortError") {
      errMsg = "タイムアウト(15秒)";
    } else if (e.name === "TypeError") {
      errMsg = "ネットワークエラー(fetch失敗): " + e.message;
    } else {
      errMsg = e.name + ": " + e.message;
    }
    
    return JSON.stringify({
      result: debug.join("\n") + "\n\n[ERROR] " + errMsg
    });
  }
}

window.ai_edge_gallery_get_result = ai_edge_gallery_get_result;
console.log("Skill loaded. Endpoint:", SEARCH_API_URL);
</script>
</body>
</html>
